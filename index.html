<!DOCTYPE html>
<html lang="pl">
<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #080808;
    --bg2: #0f0f0f;
    --bg3: #141414;
    --bg4: #1a1a1a;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --border3: #333;
    --text: #f0f0f0;
    --text2: #b0b0b0;
    --text3: #666;
    --text4: #333;
    --green: #00C896;
    --green-dim: #00C89633;
    --green-bg: #001f14;
    --red: #FF4D6D;
    --red-dim: #FF4D6D33;
    --red-bg: #1f0008;
    --orange: #FFB830;
    --accent: #00C896;
    --font: 'DM Mono', monospace;
    --font-display: 'Syne', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 0%, #00C89608 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, #FF4D6D06 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; }
  
  /* LAYOUT */
  .app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1.5rem; min-height: 100vh; }
  
  /* HEADER */
  .hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .hdr-title { font-size: 12px; color: #999; letter-spacing: 0.12em; text-transform: uppercase; }
  .hdr-right { display: flex; gap: 8px; align-items: center; }
  .hdr-user { font-size: 12px; color: #bbb; }

  /* BUTTONS */
  .btn { font-family: var(--font); font-size: 11px; padding: 6px 14px; border: 1px solid var(--border2); border-radius: 20px; background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
  .btn:hover { color: var(--text); border-color: var(--border3); background: var(--bg4); }
  .btn-primary { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .btn-primary:hover { background: #002a1a; }
  .btn-danger { background: var(--red-bg); border-color: var(--red); color: var(--red); font-size: 11px; padding: 3px 8px; border-radius: 4px; }

  /* AUTH */
  .auth-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .auth-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; text-align: center; }
  .auth-title { font-size: 14px; color: var(--text); margin-bottom: 0.5rem; }
  .auth-sub { font-size: 11px; color: #888; margin-bottom: 1.5rem; line-height: 1.6; }
  .auth-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 12px; padding: 10px 12px; margin-bottom: 8px; outline: none; }
  .auth-input:focus { border-color: var(--border2); }
  .auth-input::placeholder { color: var(--text4); }
  .auth-btn { width: 100%; padding: 10px; border-radius: 6px; border: none; background: var(--green); color: #000; font-family: var(--font); font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 4px; }
  .auth-btn:hover { background: #1ab882; }
  .auth-link { font-size: 11px; color: var(--text3); margin-top: 12px; cursor: pointer; }
  .auth-link span { color: var(--green); }
  .auth-err { font-size: 11px; color: var(--red); margin-top: 8px; min-height: 16px; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  @media(max-width:600px){ .metrics { grid-template-columns: repeat(2,1fr); } }
  .metric { background: linear-gradient(135deg, #111 0%, #0d0d0d 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; position: relative; overflow: hidden; transition: border-color 0.2s; }
  .metric:hover { border-color: var(--border2); }
  .metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #ffffff08, transparent); }
  .metric-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .metric-value { font-size: 20px; font-weight: 500; color: var(--text); font-family: var(--font-display); }
  .pos { color: var(--green) !important; }
  .neg { color: var(--red) !important; }

  /* CALENDAR */
  .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .cal-month { font-size: 22px; color: var(--text); font-weight: 700; letter-spacing: 0.02em; font-family: var(--font-display); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 11px; color: #aaa; padding: 6px 0; letter-spacing: 0.06em; font-weight: bold; }
  .cal-day { background: linear-gradient(135deg, #111 0%, #0e0e0e 100%); border: 1px solid #1a1a1a; border-radius: var(--radius); min-height: 80px; padding: 8px; cursor: pointer; transition: all 0.2s; position: relative; }
  @media(max-width:600px){ .cal-day { min-height: 52px; padding: 4px; } }
  .cal-day:hover { border-color: #333; background: #141414; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .cal-day.empty { background: #0d0d0d; border-color: #161616; cursor: default; opacity: 0.2; }
  .cal-day.today { border-color: #555 !important; background: #1a1a1a; }
  .cal-day.selected { border-color: #fff !important; box-shadow: 0 0 0 1px #fff; }
  .cal-day.has-pos { background: linear-gradient(135deg, #001f14, #001208); border-color: var(--green); box-shadow: 0 0 20px var(--green-dim); }
  .cal-day.has-pos:hover { background: linear-gradient(135deg, #002a1a, #001810); transform: translateY(-2px); box-shadow: 0 6px 24px var(--green-dim); }
  .cal-day.has-neg { background: linear-gradient(135deg, #1f0008, #130005); border-color: var(--red); box-shadow: 0 0 20px var(--red-dim); }
  .cal-day.has-neg:hover { background: linear-gradient(135deg, #280010, #1a0008); transform: translateY(-2px); box-shadow: 0 6px 24px var(--red-dim); }
  .cal-day-num { font-size: 13px; color: #fff; margin-bottom: 4px; font-weight: bold; }
  .cal-day.empty .cal-day-num { color: #333; }
  .cal-day.today .cal-day-num { color: #fff; }
  .cal-day.has-pos .cal-day-num { color: #fff; }
  .cal-day.has-neg .cal-day-num { color: #fff; }
  .cal-pnl { font-size: 12px; font-weight: bold; line-height: 1.3; }
  .cal-day.has-pos .cal-pnl { color: var(--green); }
  .cal-day.has-neg .cal-pnl { color: var(--red); }
  .cal-cnt { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .cal-day.has-pos .cal-cnt { color: rgba(46,204,154,0.6); }
  .cal-day.has-neg .cal-cnt { color: rgba(255,107,106,0.6); }
  .cal-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 1.25rem; }
  @media(max-width:600px){ .cal-summary { grid-template-columns: repeat(2,1fr); } }

  /* DAY VIEW */
  .day-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .day-title { font-size: 24px; color: var(--text); font-weight: 800; font-family: var(--font-display); letter-spacing: -0.01em; }
  .section-title { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #161616; font-family: var(--font-display); font-weight: 600; }
  .form-grid { display: grid; grid-template-columns: 1fr 80px 90px 90px 90px auto; gap: 6px; align-items: end; margin-bottom: 6px; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 80px 1fr; gap: 6px; margin-bottom: 10px; }
  @media(max-width:600px){
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid2 { grid-template-columns: 1fr 1fr; }
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 11px; color: #ccc; letter-spacing: 0.04em; font-weight: bold; }
  input, select, textarea { font-family: var(--font); font-size: 13px; width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 0 12px; height: 38px; outline: none; transition: all 0.15s; }
  input:focus, select:focus { border-color: var(--green); background: var(--bg4); box-shadow: 0 0 0 3px var(--green-dim); }
  input::placeholder { color: #444; }
  select option { background: #1a1a1a; color: #fff; }
  textarea { height: 70px; padding: 10px; resize: vertical; color: #fff; font-size: 13px; } textarea::placeholder { color: #444; }
  .btn-add { font-family: var(--font-display); font-size: 13px; height: 38px; padding: 0 20px; cursor: pointer; background: var(--green); border: none; border-radius: var(--radius-sm); color: #000; font-weight: 700; white-space: nowrap; transition: all 0.15s; letter-spacing: 0.02em; }
  .btn-add:hover { background: #00e0a8; transform: translateY(-1px); box-shadow: 0 4px 16px var(--green-dim); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 560px; }
  th { text-align: left; color: var(--text3); font-size: 10px; padding: 8px 10px; border-bottom: 1px solid #161616; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-display); }
  td { padding: 10px 10px; border-bottom: 1px solid #111; color: var(--text); vertical-align: middle; transition: background 0.1s; }
  tr:hover td { background: #0f0f0f; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: bold; }
  .bl { background: var(--green-bg); color: var(--green); }
  .bs { background: var(--red-bg); color: var(--red); }
  .bw { background: var(--green-bg); color: var(--green); }
  .blo { background: var(--red-bg); color: var(--red); }
  .tag { display: inline-block; background: #1a1a1a; border: 0.5px solid #333; border-radius: 3px; padding: 1px 5px; font-size: 9px; color: #aaa; }
  .empty-row { text-align: center; padding: 20px; color: #666; }

  /* LOADER */
  .loader { text-align: center; padding: 3rem; color: #888; font-size: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 24px; border-radius: 20px; font-size: 12px; font-weight: 700; font-family: var(--font-display); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; box-shadow: 0 4px 20px var(--green-dim); }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--red); color: #fff; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* PWA install banner */
  .install-banner { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text2); }
  .install-banner.hidden { display: none; }

  /* ANALYTICS */
  .analytics-wrap { margin-bottom: 1.5rem; }
  .period-tabs { display: flex; gap: 4px; margin-bottom: 1rem; width: fit-content; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px; }
  .period-tab { background: none; border: none; font-family: var(--font-display); font-size: 11px; color: var(--text3); padding: 6px 16px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 16px; font-weight: 600; transition: all 0.15s; }
  .period-tab.active { background: var(--bg4); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .period-tab:hover:not(.active) { color: var(--text2); }
  .analytics-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 1rem; }
  @media(max-width:700px){ .analytics-stats { grid-template-columns: repeat(2,1fr); } }
  .chart-container { background: linear-gradient(135deg, #0d0d0d, #0a0a0a); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 0; }
  .chart-title { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .chart-canvas-wrap { position: relative; height: 200px; }

  /* CHECKLIST */
  .checklist-wrap { margin-bottom: 12px; background: linear-gradient(135deg, #0d0d0d, #0a0a0a); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .checklist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; }
  .checklist-title { font-size: 12px; color: var(--text); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-family: var(--font-display); }
  .checklist-stars { font-size: 14px; letter-spacing: 2px; }
  .checklist-group { margin-bottom: 4px; }
  .checklist-group-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; padding-left: 2px; }
  .checklist-items { display: flex; flex-direction: column; gap: 4px; }
  .checklist-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 8px; border-radius: var(--radius-sm); transition: all 0.15s; }
  .checklist-item:hover { background: #141414; }
  .checklist-item input[type=checkbox] { width: 16px; height: 16px; min-width: 16px; accent-color: #1D9E75; cursor: pointer; background: #1a1a1a; border: 1px solid #333; }
  .checklist-item label { font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; transition: color 0.15s; }
  .checklist-item.checked label { color: var(--green); text-decoration: line-through; opacity: 0.7; }
  .checklist-score { margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e1e1e; display: flex; align-items: center; gap: 10px; }
  .score-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .score-val { font-size: 13px; color: #ccc; font-weight: bold; }
  .star-gold { color: #F4A020; } .star-green { color: #1D9E75; } .star-red { color: #E24B4A; }
</style>
</head>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4lmPQMRp0ME0Yz34ooaZn5dwp7P4w2E0",
  authDomain: "trader-dziennik-8cd86.firebaseapp.com",
  projectId: "trader-dziennik-8cd86",
  storageBucket: "trader-dziennik-8cd86.firebasestorage.app",
  messagingSenderId: "536822433591",
  appId: "1:536822433591:web:04f619b8ac29715ed7bcb2",
  databaseURL: "https://trader-dziennik-8cd86-default-rtdb.europe-west1.firebasedatabase.app"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getDatabase(firebaseApp);

const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const DOWS = ['Pn','Wt','Śr','Cz','Pt','Sb','Nd'];

let currentUser = null;
let viewYear, viewMonth;
let selectedDay = null;
let dayCache = {};
let deferredPrompt = null;

const now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();

// PWA install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (err?' err':'') + ' show';
  setTimeout(() => el.classList.remove('show'), 2500);
}

function getCurrency() {
  return localStorage.getItem('tj_currency') || 'EUR';
}
function fmt(v) {
  const c = getCurrency();
  return (v >= 0 ? '+' : '') + v.toFixed(2).replace('.', ',') + ' ' + c;
}

function dateKey(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

function dbPath(dk) {
  return 'users/' + currentUser.uid + '/days/' + dk;
}

async function loadDay(dk) {
  if (dayCache[dk] !== undefined) return dayCache[dk];
  try {
    const snap = await get(ref(db, dbPath(dk)));
    dayCache[dk] = snap.exists() ? snap.val() : { trades: [], notes: '' };
  } catch(e) {
    dayCache[dk] = { trades: [], notes: '' };
  }
  if (!dayCache[dk].trades) dayCache[dk].trades = [];
  return dayCache[dk];
}

async function saveDay(dk) {
  try {
    await set(ref(db, dbPath(dk)), dayCache[dk]);
  } catch(e) {
    toast('Błąd zapisu!', true);
  }
}

// ============ AUTH ============
function renderAuth(mode='login') {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-title">Dziennik Tradera</div>
        <div class="auth-sub">${mode==='login' ? 'Zaloguj się do swojego konta' : 'Utwórz nowe konto'}</div>
        <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email">
        <input class="auth-input" id="auth-pass" type="password" placeholder="Hasło" autocomplete="${mode==='login'?'current-password':'new-password'}">
        <button class="auth-btn" id="auth-submit">${mode==='login' ? 'Zaloguj się' : 'Zarejestruj się'}</button>
        <div class="auth-err" id="auth-err"></div>
        <div class="auth-link" id="auth-toggle">
          ${mode==='login' ? 'Nie masz konta? <span>Zarejestruj się</span>' : 'Masz już konto? <span>Zaloguj się</span>'}
        </div>
      </div>
    </div>
  `;

  document.getElementById('auth-submit').onclick = async () => {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-err');
    errEl.textContent = '';
    try {
      if (mode === 'login') {
        await signInWithEmailAndPassword(auth, email, pass);
      } else {
        await createUserWithEmailAndPassword(auth, email, pass);
      }
    } catch(e) {
      const msgs = {
        'auth/invalid-email': 'Nieprawidłowy email',
        'auth/user-not-found': 'Nie znaleziono konta',
        'auth/wrong-password': 'Złe hasło',
        'auth/email-already-in-use': 'Email już zajęty',
        'auth/weak-password': 'Hasło za słabe (min. 6 znaków)',
        'auth/invalid-credential': 'Zły email lub hasło',
      };
      errEl.textContent = msgs[e.code] || e.message;
    }
  };

  document.getElementById('auth-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('auth-submit').click();
  });

  document.getElementById('auth-toggle').onclick = () => {
    renderAuth(mode === 'login' ? 'register' : 'login');
  };
}

// ============ MAIN APP ============
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="hdr">
      <span class="hdr-title">Dziennik <span>Tradera</span></span>
      <div class="hdr-right">
        <span class="hdr-user" id="hdr-user"></span>
        <select id="sel-currency" class="btn" style="padding:4px 8px;cursor:pointer;">
          <option value="EUR">EUR</option>
          <option value="USD">USD</option>
          <option value="PLN">PLN</option>
          <option value="GBP">GBP</option>
          <option value="CHF">CHF</option>
        </select>
        <button class="btn" id="btn-csv">CSV ↓</button>
        <button class="btn" id="btn-install" style="display:none">Zainstaluj apkę</button>
        <button class="btn" id="btn-logout">Wyloguj</button>
      </div>
    </div>

    <div class="view active" id="view-cal">
      <div class="cal-nav">
        <button class="btn" id="btn-prev">‹ Poprzedni</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="btn" id="btn-next">Następny ›</button>
      </div>
      <div class="cal-grid" id="cal-dows"></div>
      <div class="cal-grid" style="margin-top:3px;gap:3px" id="cal-days"></div>
      <div class="cal-summary" id="cal-summary"></div>

      <div class="analytics-wrap" style="margin-top:1.5rem;">
        <div class="period-tabs">

// ============ CHECKLIST ============
function updateChecklist() {
  const total = 5;
  let checked = 0;
  for(let i=1; i<=5; i++) {
    const el = document.getElementById('cl'+i);
    if(el && el.checked) { checked++; el.parentElement.classList.add('checked'); }
    else if(el) el.parentElement.classList.remove('checked');
  }
  const stars = '★'.repeat(checked) + '☆'.repeat(total-checked);
  const el1 = document.getElementById('cl-stars');
  const el2 = document.getElementById('cl-stars2');
  const elScore = document.getElementById('cl-score');
  if(el1) el1.textContent = stars;
  if(el2) el2.textContent = stars;
  if(elScore) elScore.textContent = checked+'/'+total;

  // Color stars based on score
  const color = checked <= 1 ? '#E24B4A' : checked <= 3 ? '#F4A020' : '#1D9E75';
  if(el1) el1.style.color = color;
  if(el2) el2.style.color = color;
  if(elScore) elScore.style.color = color;
}

function toggleChecklist() {
  const body = document.getElementById('checklist-body');
  if(body) body.style.display = body.style.display === 'none' ? '' : 'none';
}

function resetChecklist() {
  for(let i=1; i<=5; i++) {
    const el = document.getElementById('cl'+i);
    if(el) { el.checked = false; el.parentElement.classList.remove('checked'); }
  }
  updateChecklist();
}

function getChecklistScore() {
  let checked = 0;
  for(let i=1; i<=5; i++) {
    const el = document.getElementById('cl'+i);
    if(el && el.checked) checked++;
  }
  return checked;
}

// ============ ANALYTICS ============
let currentPeriod = 'year';
let pnlChart = null;

window.setPeriod = async function(p) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period === p));
  await renderAnalytics();
};

async function renderAnalytics() {
  const cur = getCurrency();
  if (currentPeriod === 'year') await renderYearAnalytics(cur);
  else if (currentPeriod === 'month') await renderMonthAnalytics(cur);
  else await renderWeekAnalytics(cur);
}

async function renderYearAnalytics(cur) {
  // Load all months of current year
  const months = [];
  for(let m=0; m<12; m++) {
    const days = new Date(viewYear, m+1, 0).getDate();
    let pnl=0, trades=0, wins=0;
    for(let d=1; d<=days; d++) {
      const dk = dateKey(viewYear, m, d);
      await loadDay(dk);
      const data = dayCache[dk]||{trades:[]};
      pnl += (data.trades||[]).reduce((s,t)=>s+t.pnl,0);
      trades += (data.trades||[]).length;
      wins += (data.trades||[]).filter(t=>t.pnl>0).length;
    }
    months.push({label: MONTHS[m].slice(0,3), pnl, trades, wins});
  }
  const totalPnl = months.reduce((s,m)=>s+m.pnl,0);
  const totalTrades = months.reduce((s,m)=>s+m.trades,0);
  const totalWins = months.reduce((s,m)=>s+m.wins,0);
  const bestMonth = months.reduce((a,b)=>a.pnl>b.pnl?a:b);
  const wr = totalTrades ? Math.round(totalWins/totalTrades*100) : 0;

  document.getElementById('chart-title').innerHTML = 'Miesięczny P&L — <span id="chart-year">' + viewYear + '</span>';
  document.getElementById('analytics-stats').innerHTML = `
    <div class="metric"><div class="metric-label">Roczny P&L</div><div class="metric-value ${totalPnl>=0?'pos':'neg'}">${fmt(totalPnl)}</div></div>
    <div class="metric"><div class="metric-label">Trafność</div><div class="metric-value ${wr>=50?'pos':'neg'}">${wr} %</div></div>
    <div class="metric"><div class="metric-label">Transakcje</div><div class="metric-value">${totalTrades}</div></div>
    <div class="metric"><div class="metric-label">Najlepszy mies.</div><div class="metric-value pos">${bestMonth.label}</div></div>
    <div class="metric"><div class="metric-label">Aktywne mies.</div><div class="metric-value">${months.filter(m=>m.trades>0).length}</div></div>
  `;
  renderBarChart(months.map(m=>m.label), months.map(m=>parseFloat(m.pnl.toFixed(2))), cur);
}

async function renderMonthAnalytics(cur) {
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  // Build 4 proper Mon-Sun weeks that cover the month
  const firstDay = new Date(viewYear, viewMonth, 1);
  const firstMon = new Date(firstDay);
  const dow0 = firstDay.getDay() === 0 ? 6 : firstDay.getDay()-1;
  firstMon.setDate(firstDay.getDate() - dow0);

  const weeks = [];
  for(let w=0; w<4; w++) {
    const weekStart = new Date(firstMon); weekStart.setDate(firstMon.getDate() + w*7);
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
    const entry = {label:'Tydz. '+(w+1), pnl:0, trades:0, wins:0};
    for(let dd=new Date(weekStart); dd<=weekEnd; dd.setDate(dd.getDate()+1)) {
      const dk = dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
      await loadDay(dk);
      const data = dayCache[dk]||{trades:[]};
      entry.pnl += (data.trades||[]).reduce((s,t)=>s+t.pnl,0);
      entry.trades += (data.trades||[]).length;
      entry.wins += (data.trades||[]).filter(t=>t.pnl>0).length;
    }
    weeks.push(entry);
  }
  const totalPnl = weeks.reduce((s,w)=>s+w.pnl,0);
  const totalTrades = weeks.reduce((s,w)=>s+w.trades,0);
  const totalWins = weeks.reduce((s,w)=>s+w.wins,0);
  const wr = totalTrades ? Math.round(totalWins/totalTrades*100) : 0;
  const best = weeks.length ? weeks.reduce((a,b)=>a.pnl>b.pnl?a:b) : {label:'—'};

  document.getElementById('chart-title').innerHTML = 'Tygodniowy P&L — ' + MONTHS[viewMonth] + ' ' + viewYear;
  document.getElementById('analytics-stats').innerHTML = `
    <div class="metric"><div class="metric-label">Mies. P&L</div><div class="metric-value ${totalPnl>=0?'pos':'neg'}">${fmt(totalPnl)}</div></div>
    <div class="metric"><div class="metric-label">Trafność</div><div class="metric-value ${wr>=50?'pos':'neg'}">${wr} %</div></div>
    <div class="metric"><div class="metric-label">Transakcje</div><div class="metric-value">${totalTrades}</div></div>
    <div class="metric"><div class="metric-label">Najlepszy tydz.</div><div class="metric-value pos">${best.label}</div></div>
    <div class="metric"><div class="metric-label">Aktywne tygodnie</div><div class="metric-value">${weeks.filter(w=>w.trades>0).length}</div></div>
  `;
  renderBarChart(weeks.map(w=>w.label), weeks.map(w=>parseFloat(w.pnl.toFixed(2))), cur);
}

async function renderWeekAnalytics(cur) {
  // Find current week days
  const today = new Date();
  const dow = today.getDay() === 0 ? 6 : today.getDay()-1;
  const mon = new Date(today); mon.setDate(today.getDate()-dow);
  const dayNames = ['Pon','Wt','Śr','Czw','Pt','Sob','Nd'];
  const days = [];
  let totalPnl=0, totalTrades=0, totalWins=0;
  for(let i=0; i<7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const dk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    await loadDay(dk);
    const data = dayCache[dk]||{trades:[]};
    const pnl = (data.trades||[]).reduce((s,t)=>s+t.pnl,0);
    const tr = (data.trades||[]).length;
    const w = (data.trades||[]).filter(t=>t.pnl>0).length;
    totalPnl+=pnl; totalTrades+=tr; totalWins+=w;
    days.push({label:dayNames[i], pnl, trades:tr});
  }
  const wr = totalTrades ? Math.round(totalWins/totalTrades*100) : 0;
  document.getElementById('chart-title').innerHTML = 'Dzienny P&L — bieżący tydzień';
  document.getElementById('analytics-stats').innerHTML = `
    <div class="metric"><div class="metric-label">Tygodniowy P&L</div><div class="metric-value ${totalPnl>=0?'pos':'neg'}">${fmt(totalPnl)}</div></div>
    <div class="metric"><div class="metric-label">Trafność</div><div class="metric-value ${wr>=50?'pos':'neg'}">${wr} %</div></div>
    <div class="metric"><div class="metric-label">Transakcje</div><div class="metric-value">${totalTrades}</div></div>
    <div class="metric"><div class="metric-label">Aktywne dni</div><div class="metric-value">${days.filter(d=>d.trades>0).length}</div></div>
    <div class="metric"><div class="metric-label">Waluta</div><div class="metric-value">${cur}</div></div>
  `;
  renderBarChart(days.map(d=>d.label), days.map(d=>parseFloat(d.pnl.toFixed(2))), cur);
}

function renderBarChart(labels, data, cur) {
  if(pnlChart) { pnlChart.destroy(); pnlChart=null; }
  const canvas = document.getElementById('pnl-chart');
  if(!canvas) return;
  // Force canvas reset
  const parent = canvas.parentElement;
  const newCanvas = document.createElement('canvas');
  newCanvas.id = 'pnl-chart';
  parent.innerHTML = '';
  parent.appendChild(newCanvas);
  const colors = data.map(v => v >= 0 ? 'rgba(29,158,117,0.85)' : 'rgba(226,75,74,0.85)');
  const borderColors = data.map(v => v >= 0 ? '#1D9E75' : '#E24B4A');
  pnlChart = new Chart(newCanvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => (ctx.raw>=0?'+':'')+ctx.raw.toFixed(2)+' '+cur
          }
        },
        datalabels: false
      },
      scales: {
        x: {
          ticks: { color: '#aaa', font: { family: 'Courier New', size: 11 } },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: '#222' }
        },
        y: {
          ticks: {
            color: '#999',
            font: { family: 'Courier New', size: 10 },
            callback: v => (v>=0?'+':'')+v.toFixed(0)+' '+cur
          },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: '#222' }
        }
      }
    }
  });
}

// ============ CALENDAR ============
async function renderCal() {
  showView('cal');
  document.getElementById('cal-month').textContent = MONTHS[viewMonth] + ' ' + viewYear;

  const dowEl = document.getElementById('cal-dows');
  dowEl.innerHTML = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;

  // preload all days
  const keys = Array.from({length: daysInMonth}, (_,i) => dateKey(viewYear, viewMonth, i+1));
  await Promise.all(keys.map(k => loadDay(k)));

  const daysEl = document.getElementById('cal-days');
  let html = '';
  for(let i=0; i<offset; i++) html += '<div class="cal-day empty"></div>';

  let mPnl=0, mTrades=0, mWins=0, mDays=0;

  for(let d=1; d<=daysInMonth; d++) {
    const dk = dateKey(viewYear, viewMonth, d);
    const data = dayCache[dk] || {trades:[]};
    const pnl = (data.trades||[]).reduce((s,t)=>s+t.pnl,0);
    const cnt = (data.trades||[]).length;
    const wins = (data.trades||[]).filter(t=>t.pnl>0).length;
    mPnl+=pnl; mTrades+=cnt; mWins+=wins;
    if(cnt>0) mDays++;

    const isToday = d===now.getDate() && viewMonth===now.getMonth() && viewYear===now.getFullYear();
    const isSel = selectedDay===dk;
    let cls = 'cal-day';
    if(isToday) cls+=' today';
    if(isSel) cls+=' selected';
    if(cnt>0) cls += pnl>=0 ? ' has-pos' : ' has-neg';

    html += `<div class="${cls}" onclick="openDay('${dk}',${d})">
      <div class="cal-day-num">${d}</div>
      ${cnt>0 ? `<div class="cal-pnl">${fmt(pnl)}</div><div class="cal-cnt">${cnt} tr.</div>` : ''}
    </div>`;
  }
  daysEl.innerHTML = html;

  const wr = mTrades ? Math.round(mWins/mTrades*100) : null;
  document.getElementById('cal-summary').innerHTML = `
    <div class="metric"><div class="metric-label">Mies. P&L</div><div class="metric-value ${mPnl>0?'pos':mPnl<0?'neg':''}">${fmt(mPnl)}</div></div>
    <div class="metric"><div class="metric-label">Trafność</div><div class="metric-value ${wr===null?'':wr>=50?'pos':'neg'}">${wr!==null?wr+' %':'—'}</div></div>
    <div class="metric"><div class="metric-label">Transakcje</div><div class="metric-value">${mTrades}</div></div>
    <div class="metric"><div class="metric-label">Aktywne dni</div><div class="metric-value">${mDays}</div></div>
  `;
}

window.openDay = async function(dk, d) {
  selectedDay = dk;
  await loadDay(dk);
  showView('day');

  const [y,m] = dk.split('-');
  document.getElementById('day-title').textContent = d + ' ' + MONTHS[parseInt(m)-1] + ' ' + y;
  document.getElementById('d-notes').value = dayCache[dk].notes || '';
  document.getElementById('d-notes').oninput = () => {
    dayCache[dk].notes = document.getElementById('d-notes').value;
    saveDay(dk);
  };

  resetChecklist();
  renderDayMetrics();
  renderDayTable();
  const lbl2 = document.getElementById('lbl-pnl'); if(lbl2) lbl2.textContent = 'P&L ('+getCurrency()+')';
};

function renderDayMetrics() {
  const dk = selectedDay;
  const trades = (dayCache[dk]||{trades:[]}).trades||[];
  const pnl = trades.reduce((s,t)=>s+t.pnl,0);
  const wins = trades.filter(t=>t.pnl>0).length;
  const wr = trades.length ? Math.round(wins/trades.length*100) : null;
  const rrs = trades.filter(t=>t.rr).map(t=>t.rr);
  const avgRR = rrs.length ? (rrs.reduce((a,b)=>a+b,0)/rrs.length).toFixed(1) : null;

  const pe = document.getElementById('d-pnl');
  pe.textContent = fmt(pnl);
  pe.className = 'metric-value '+(pnl>0?'pos':pnl<0?'neg':'');
  const we = document.getElementById('d-wr');
  we.textContent = wr!==null?wr+' %':'—';
  we.className = 'metric-value '+(wr===null?'':wr>=50?'pos':'neg');
  document.getElementById('d-cnt').textContent = trades.length;
  document.getElementById('d-rr').textContent = avgRR??'—';
}

  const dk = selectedDay;

    <td style="color:var(--text4)">${i+1}</td>
    <td style="font-weight:bold;color:var(--text)">${t.symbol}</td>
    <td><span class="badge ${t.dir==='LONG'?'bl':'bs'}">${t.dir}</span></td>
    <td>${t.entry??'—'}</td><td>${t.exit??'—'}</td>
    <td>${t.lot!==null&&t.lot!==undefined?t.lot.toFixed(2):'—'}</td>
    <td class="${t.pnl>=0?'pos':'neg'}" style="font-weight:bold">${fmt(t.pnl)}</td>
    <td>${t.rr!==null?t.rr+'R':'—'}</td>
    <td>${t.setup?'<span class="tag">'+t.setup+'</span>':'—'}</td>
    <td style="color:#ccc;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note||'—'}</td>
    <td style="color:#F4A020;font-size:11px;letter-spacing:1px">${t.score!==undefined ? '★'.repeat(t.score)+'☆'.repeat(5-t.score) : '—'}</td>
    <td><span class="badge ${t.pnl>=0?'bw':'blo'}">${t.pnl>=0?'WIN':'LOSS'}</span></td>
    <td><button class="btn-danger" onclick="removeTrade(${t.id})">×</button></td>
  </tr>`).join('');
}

function addTrade() {
  const dk = selectedDay;
  const sym = document.getElementById('i-sym').value.trim().toUpperCase();
  if(!sym){ document.getElementById('i-sym').focus(); return; }
  const pnl = parseFloat(document.getElementById('i-pnl').value);
  if(isNaN(pnl)){ document.getElementById('i-pnl').focus(); return; }
  const en = parseFloat(document.getElementById('i-en').value);
  const ex = parseFloat(document.getElementById('i-ex').value);
  const rr = parseFloat(document.getElementById('i-rr').value);
  if(!dayCache[dk]) dayCache[dk]={trades:[],notes:''};
  if(!dayCache[dk].trades) dayCache[dk].trades=[];
  const clScore = getChecklistScore();
  const lot = parseFloat(document.getElementById('i-lot').value);
  dayCache[dk].trades.push({
    id: Date.now(), symbol:sym, dir:document.getElementById('i-dir').value,
    entry:isNaN(en)?null:en, exit:isNaN(ex)?null:ex, pnl,
    lot:isNaN(lot)?null:lot,
    rr:isNaN(rr)?null:rr,
    setup:document.getElementById('i-setup').value.trim(),
    note:document.getElementById('i-note').value.trim(),
    score:clScore
  });
  resetChecklist();
  ['i-sym','i-en','i-ex','i-pnl','i-lot','i-rr','i-setup','i-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('i-sym').focus();
  saveDay(dk); renderDayMetrics(); renderDayTable();
  toast('Transakcja dodana');
}

window.removeTrade = function(id) {
  const dk = selectedDay;
  dayCache[dk].trades = dayCache[dk].trades.filter(t=>t.id!==id);
  saveDay(dk); renderDayMetrics(); renderDayTable();
};

async function exportCSV() {
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const all = [];
  for(let d=1; d<=daysInMonth; d++) {
    const dk = dateKey(viewYear, viewMonth, d);
    await loadDay(dk);
    (dayCache[dk]?.trades||[]).forEach(t=>all.push({...t,date:dk}));
  }
  if(!all.length){ toast('Brak transakcji w tym miesiącu', true); return; }
  const hdr = ['Data','Instrument','Kierunek','Wejście','Wyjście','Lot','P&L ('+getCurrency()+')','R:R','Setup','Notatka','Wynik'];
  const rows = all.map(t=>[t.date,t.symbol,t.dir,t.entry??'',t.exit??'',t.lot??'',t.pnl.toFixed(2),t.rr??'',t.setup||'',','"'+(t.note||'').replace(/"/g,'""')+'"',t.pnl>=0?'WIN':'LOSS']);
  const total = all.reduce((s,t)=>s+t.pnl,0);
  const wr = all.length?Math.round(all.filter(t=>t.pnl>0).length/all.length*100):0;
  let csv='\uFEFF'+MONTHS[viewMonth]+' '+viewYear+'\nŁączny P&L:,'+total.toFixed(2)+' zł\nTrafność:,'+wr+'%\nTransakcje:,'+all.length+'\n\n';
  csv+=hdr.join(',')+'\n'+rows.map(r=>r.join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),download:'dziennik_'+viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'.csv'});
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('CSV pobrany — '+MONTHS[viewMonth]+' '+viewYear);
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
}

// ============ AUTH STATE ============
onAuthStateChanged(auth, user => {
  document.getElementById('loader').style.display = 'none';
  if(user) {
    currentUser = user;
    dayCache = {};
    renderApp();
  } else {
    currentUser = null;
    renderAuth('login');
  }
});

// Register service worker for PWA
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
